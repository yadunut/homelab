apiVersion: apps/v1
kind: Deployment
metadata:
  name: qbittorrent
  namespace: jellyfin
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: qbittorrent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: qbittorrent
    spec:
      nodeSelector:
        kubernetes.io/hostname: penguin
      initContainers:
        - name: gluetun
          image: qmcgaw/gluetun:v3.41.1
          imagePullPolicy: IfNotPresent
          restartPolicy: Always
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
          env:
            - name: TZ
              value: Asia/Singapore
            - name: VPN_SERVICE_PROVIDER
              value: custom
            - name: VPN_TYPE
              value: wireguard
            - name: WIREGUARD_ENDPOINT_IP
              value: "2a02:6ea0:d101:6221::10"
              valueFrom:
                secretKeyRef:
                  name: qbittorrent-protonvpn
                  key: WIREGUARD_ENDPOINT_IP
            - name: WIREGUARD_ENDPOINT_PORT
              valueFrom:
                secretKeyRef:
                  name: qbittorrent-protonvpn
                  key: WIREGUARD_ENDPOINT_PORT
            - name: WIREGUARD_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: qbittorrent-protonvpn
                  key: WIREGUARD_PUBLIC_KEY
            - name: WIREGUARD_PERSISTENT_KEEPALIVE_INTERVAL
              value: 25s
            - name: VPN_PORT_FORWARDING
              value: "on"
            - name: VPN_PORT_FORWARDING_PROVIDER
              value: protonvpn
            - name: VPN_PORT_FORWARDING_UP_COMMAND
              value: /bin/sh -c 'wget -q -O /dev/null --retry-connrefused --post-data "json={\"listen_port\":{{PORT}},\"current_network_interface\":\"{{VPN_INTERFACE}}\",\"random_port\":false,\"upnp\":false}" http://127.0.0.1:8080/api/v2/app/setPreferences'
            - name: VPN_PORT_FORWARDING_DOWN_COMMAND
              value: /bin/sh -c 'wget -q -O /dev/null --retry-connrefused --post-data "json={\"listen_port\":0,\"current_network_interface\":\"lo\"}" http://127.0.0.1:8080/api/v2/app/setPreferences'
            - name: WIREGUARD_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: qbittorrent-protonvpn
                  key: WIREGUARD_PRIVATE_KEY
            - name: WIREGUARD_ADDRESSES
              valueFrom:
                secretKeyRef:
                  name: qbittorrent-protonvpn
                  key: WIREGUARD_ADDRESSES
            - name: FIREWALL_INPUT_PORTS
              value: "8080"
            - name: FIREWALL_OUTBOUND_SUBNETS
              value: "fd00:10:96::/48"
            - name: DNS_UPSTREAM_IPV6
              value: "on"
            - name: HEALTH_TARGET_ADDRESSES
              value: "ipv6.google.com:443,cloudflare.com:443"
            - name: HEALTH_ICMP_TARGET_IPS
              value: "2606:4700:4700::1111,2001:4860:4860::8888"
            - name: HEALTH_SERVER_ADDRESS
              value: ":9999"
          startupProbe:
            httpGet:
              path: /health
              port: 9999
            failureThreshold: 60
            periodSeconds: 2
          readinessProbe:
            httpGet:
              path: /health
              port: 9999
            periodSeconds: 10
          volumeMounts:
            - name: tun
              mountPath: /dev/net/tun
      containers:
        - name: qbittorrent
          image: lscr.io/linuxserver/qbittorrent:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: TZ
              value: Asia/Singapore
            - name: PUID
              value: "0"
            - name: PGID
              value: "0"
            - name: UMASK
              value: "002"
            - name: WEBUI_PORT
              value: "8080"
            - name: TORRENTING_PORT
              value: "6881"
          readinessProbe:
            tcpSocket:
              port: http
          livenessProbe:
            tcpSocket:
              port: http
          volumeMounts:
            - name: config
              mountPath: /config
            - name: shared-media
              mountPath: /data/torrents
              subPath: torrents
      volumes:
        - name: tun
          hostPath:
            path: /dev/net/tun
            type: CharDevice
        - name: config
          persistentVolumeClaim:
            claimName: qbittorrent-config
        - name: shared-media
          persistentVolumeClaim:
            claimName: jellyfin-media
