apiVersion: apps/v1
kind: Deployment
metadata:
  name: qbittorrent
  namespace: jellyfin
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: qbittorrent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: qbittorrent
    spec:
      nodeSelector:
        kubernetes.io/hostname: penguin
      initContainers:
        - name: init-download-layout
          image: busybox:1.37
          command:
            - sh
            - -c
            - |
              mkdir -p /shared/downloads/tv /shared/downloads/movies
          volumeMounts:
            - name: shared-media
              mountPath: /shared
      containers:
        - name: qbittorrent
          image: lscr.io/linuxserver/qbittorrent:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
            - name: bittorrent
              containerPort: 6881
              hostPort: 6881
              protocol: TCP
            - name: bittorrent-udp
              containerPort: 6881
              hostPort: 6881
              protocol: UDP
          env:
            - name: TZ
              value: Asia/Singapore
            - name: PUID
              value: "0"
            - name: PGID
              value: "0"
            - name: UMASK
              value: "002"
            - name: WEBUI_PORT
              value: "8080"
            - name: TORRENTING_PORT
              value: "6881"
          readinessProbe:
            tcpSocket:
              port: http
          livenessProbe:
            tcpSocket:
              port: http
          volumeMounts:
            - name: config
              mountPath: /config
            - name: shared-media
              mountPath: /downloads
              subPath: downloads
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: qbittorrent-config
        - name: shared-media
          persistentVolumeClaim:
            claimName: jellyfin-media
