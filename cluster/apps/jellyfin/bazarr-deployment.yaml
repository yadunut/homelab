apiVersion: apps/v1
kind: Deployment
metadata:
  name: bazarr
  namespace: jellyfin
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: bazarr
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bazarr
    spec:
      nodeSelector:
        kubernetes.io/hostname: penguin
      initContainers:
        - name: init-media-layout
          image: busybox:1.37
          command:
            - sh
            - -c
            - |
              mkdir -p /shared/media/movies /shared/media/tv
          volumeMounts:
            - name: shared-media
              mountPath: /shared
      containers:
        - name: bazarr
          image: lscr.io/linuxserver/bazarr:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 6767
          env:
            - name: TZ
              value: Asia/Singapore
            - name: PUID
              value: "0"
            - name: PGID
              value: "0"
            - name: UMASK
              value: "002"
            - name: HTTPS_PROXY
              value: "http://http-proxy.kube-system.svc.k8s.internal:8888"
            - name: HTTP_PROXY
              value: "http://http-proxy.kube-system.svc.k8s.internal:8888"
            - name: NO_PROXY
              value: ".k8s.internal,.svc,localhost,127.0.0.1,10.0.0.0/8,fd00::/8"
            - name: https_proxy
              value: "http://http-proxy.kube-system.svc.k8s.internal:8888"
            - name: http_proxy
              value: "http://http-proxy.kube-system.svc.k8s.internal:8888"
            - name: no_proxy
              value: ".k8s.internal,.svc,localhost,127.0.0.1,10.0.0.0/8,fd00::/8"
          readinessProbe:
            tcpSocket:
              port: http
          livenessProbe:
            tcpSocket:
              port: http
          volumeMounts:
            - name: config
              mountPath: /config
            - name: shared-media
              mountPath: /movies
              subPath: media/movies
            - name: shared-media
              mountPath: /tv
              subPath: media/tv
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: bazarr-config
        - name: shared-media
          persistentVolumeClaim:
            claimName: jellyfin-media
