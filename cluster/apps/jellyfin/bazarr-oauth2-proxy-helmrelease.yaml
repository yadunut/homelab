apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: bazarr-oauth2-proxy
  namespace: jellyfin
spec:
  interval: 1h
  chart:
    spec:
      chart: oauth2-proxy
      version: 10.1.*
      sourceRef:
        kind: HelmRepository
        name: oauth2-proxy
        namespace: flux-system
      interval: 1h
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    revisionHistoryLimit: 2
    strategy:
      type: Recreate
    extraEnv:
      - name: HTTPS_PROXY
        value: "http://http-proxy.kube-system.svc.k8s.internal:8888"
      - name: HTTP_PROXY
        value: "http://http-proxy.kube-system.svc.k8s.internal:8888"
      - name: NO_PROXY
        value: ".k8s.internal,.svc,localhost,127.0.0.1,10.0.0.0/8,fd00::/8"
    config:
      existingSecret: bazarr-oauth
      cookieName: bazarr-oauth2-proxy
    extraArgs:
      provider: oidc
      scope: "openid email groups"
      oidc-issuer-url: https://idm.yadunut.dev/oauth2/openid/bazarr
      oidc-groups-claim: "groups"
      allowed-group: "jellyfin_access@idm.yadunut.dev"
      redirect-url: https://bazarr.yadunut.dev/oauth2/callback
      upstream: "static://202"
      email-domain: "*"
      cookie-domain: bazarr.yadunut.dev
      cookie-secure: "true"
      whitelist-domain: bazarr.yadunut.dev
      skip-provider-button: "true"
      code-challenge-method: "S256"
      reverse-proxy: "true"
      set-xauthrequest: "true"
      pass-access-token: "true"
      set-authorization-header: "true"
    ingress:
      enabled: false
