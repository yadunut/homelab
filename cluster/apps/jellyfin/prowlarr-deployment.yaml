apiVersion: apps/v1
kind: Deployment
metadata:
  name: prowlarr
  namespace: jellyfin
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: prowlarr
  template:
    metadata:
      labels:
        app.kubernetes.io/name: prowlarr
    spec:
      nodeSelector:
        kubernetes.io/hostname: penguin
      initContainers:
        - name: init-auth-config
          image: busybox:1.37
          command:
            - sh
            - -c
            - |
              if [ -f /config/config.xml ]; then
                if grep -q "<AuthenticationMethod>" /config/config.xml; then
                  sed -i 's#<AuthenticationMethod>.*</AuthenticationMethod>#<AuthenticationMethod>External</AuthenticationMethod>#' /config/config.xml
                else
                  sed -i 's#</Config>#  <AuthenticationMethod>External</AuthenticationMethod>\n</Config>#' /config/config.xml
                fi

                if grep -q "<AuthenticationRequired>" /config/config.xml; then
                  sed -i 's#<AuthenticationRequired>.*</AuthenticationRequired>#<AuthenticationRequired>Enabled</AuthenticationRequired>#' /config/config.xml
                else
                  sed -i 's#</Config>#  <AuthenticationRequired>Enabled</AuthenticationRequired>\n</Config>#' /config/config.xml
                fi
              fi
          volumeMounts:
            - name: config
              mountPath: /config
      containers:
        - name: prowlarr
          image: lscr.io/linuxserver/prowlarr:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 9696
          env:
            - name: TZ
              value: Asia/Singapore
            - name: PUID
              value: "0"
            - name: PGID
              value: "0"
            - name: UMASK
              value: "002"
            - name: HTTPS_PROXY
              value: "http://http-proxy.kube-system.svc.k8s.internal:8888"
            - name: HTTP_PROXY
              value: "http://http-proxy.kube-system.svc.k8s.internal:8888"
            - name: NO_PROXY
              value: ".k8s.internal,.svc,localhost,127.0.0.1,10.0.0.0/8,fd00::/8"
            - name: https_proxy
              value: "http://http-proxy.kube-system.svc.k8s.internal:8888"
            - name: http_proxy
              value: "http://http-proxy.kube-system.svc.k8s.internal:8888"
            - name: no_proxy
              value: ".k8s.internal,.svc,localhost,127.0.0.1,10.0.0.0/8,fd00::/8"
          readinessProbe:
            tcpSocket:
              port: http
          livenessProbe:
            tcpSocket:
              port: http
          volumeMounts:
            - name: config
              mountPath: /config
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: prowlarr-config
