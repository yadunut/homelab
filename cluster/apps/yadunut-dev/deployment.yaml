apiVersion: apps/v1
kind: Deployment
metadata:
  name: yadunut-dev
  namespace: yadunut-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: yadunut-dev
  template:
    metadata:
      labels:
        app.kubernetes.io/name: yadunut-dev
    spec:
      imagePullSecrets:
        - name: yadunut-dev-harbor
      containers:
        - name: yadunut-dev
          image: harbor.yadunut.dev/yadunut/gleam_nut-site:main@sha256:525457c841b359c2022831ef68618b6b6da220ae6243a20f2eb06608f9c27dbd # {"$imagepolicy": "flux-system:yadunut-dev"}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: http
          livenessProbe:
            httpGet:
              path: /
              port: http
