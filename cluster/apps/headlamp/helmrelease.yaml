apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
  namespace: headlamp
spec:
  interval: 1h
  chart:
    spec:
      chart: headlamp
      version: 0.43.*
      sourceRef:
        kind: HelmRepository
        name: headlamp
        namespace: headlamp
      interval: 1h
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  postRenderers:
    - kustomize:
        patches:
          - target:
              group: apps
              version: v1
              kind: Deployment
              name: headlamp
            patch: |
              - op: replace
                path: /spec/template/spec/containers/0/args
                value:
                  - "-in-cluster"
                  - "-in-cluster-context-name=main"
                  - "-plugins-dir=/headlamp/plugins"
                  - "-session-ttl=86400"
                  - "-oidc-client-id=headlamp"
                  - "-oidc-idp-issuer-url=https://idm.yadunut.dev/oauth2/openid/headlamp"
                  - "-oidc-callback-url=https://headlamp.yadunut.dev/oidc-callback"
                  - "-oidc-scopes=profile,email,groups"
                  - "-oidc-use-pkce=true"
              - op: remove
                path: /spec/template/spec/containers/0/envFrom
              - op: add
                path: /spec/template/spec/containers/0/env
                value:
                  - name: HEADLAMP_CONFIG_OIDC_CLIENT_SECRET
                    valueFrom:
                      secretKeyRef:
                        name: headlamp-oidc
                        key: OIDC_CLIENT_SECRET
  values:
    replicaCount: 1
    config:
      inCluster: true
      unsafeUseServiceAccountToken: false
      oidc:
        secret:
          create: false
        externalSecret:
          enabled: true
          name: headlamp-oidc
          hasScopes: true
        usePKCE: true
    automountServiceAccountToken: true
    serviceAccount:
      create: true
      name: headlamp
    clusterRoleBinding:
      create: false
    ingress:
      enabled: false
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
