apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
  namespace: headlamp
spec:
  interval: 1h
  chart:
    spec:
      chart: headlamp
      version: 0.43.*
      sourceRef:
        kind: HelmRepository
        name: headlamp
        namespace: headlamp
      interval: 1h
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    replicaCount: 1
    config:
      inCluster: true
      unsafeUseServiceAccountToken: false
      oidc:
        secret:
          create: false
        externalSecret:
          enabled: true
          name: headlamp-oidc
          hasScopes: true
        usePKCE: true
    automountServiceAccountToken: true
    serviceAccount:
      create: true
      name: headlamp
    clusterRoleBinding:
      create: false
    ingress:
      enabled: false
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
