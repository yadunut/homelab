apiVersion: cilium.io/v2
kind: CiliumBGPAdvertisement
metadata:
  name: pod-cidr-advertisements
  labels:
    advertise: bgp
spec:
  advertisements:
    - advertisementType: PodCIDR
---
apiVersion: cilium.io/v2
kind: CiliumBGPPeerConfig
metadata:
  name: local-bird
spec:
  transport:
    peerPort: 1179
    sourceInterface: lo
  gracefulRestart:
    enabled: true
    restartTimeSeconds: 30
  families:
    - afi: ipv6
      safi: unicast
      advertisements:
        matchLabels:
          advertise: bgp
---
apiVersion: cilium.io/v2
kind: CiliumBGPClusterConfig
metadata:
  name: pod-cidr-to-bird
spec:
  nodeSelector: {}
  bgpInstances:
    - name: pod-routes
      localASN: 64512
      peers:
        - name: local-bird
          peerASN: 64512
          peerAddress: "::1"
          peerConfigRef:
            name: local-bird
