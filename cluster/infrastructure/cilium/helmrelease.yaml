apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
  namespace: kube-system
spec:
  interval: 1h
  chart:
    spec:
      chart: cilium
      version: 1.19.4
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: kube-system
      interval: 1h
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    upgradeCompatibility: "1.18"
    autoDirectNodeRoutes: false
    bpf:
      masquerade: true
    bgpControlPlane:
      enabled: true
      routerIDAllocation:
        mode: ip-pool
        ipPool: 10.255.1.0/24
    cluster:
      name: nut-cluster
    devices: ens3,enp4s0,nut-+
    enableIPv6Masquerade: true
    enableRemoteNodeMasquerade: false
    extraConfig:
      direct-routing-device: en+
    hubble:
      enabled: true
      peerService:
        clusterDomain: k8s.internal
      relay:
        enabled: true
      ui:
        enabled: true
    ipam:
      mode: kubernetes
    ipv4:
      enabled: false
    ipv6:
      enabled: true
    ipv6NativeRoutingCIDR: fd00:10:96::/48
    k8sServiceHost: fd7a:115c:a1e0::1
    k8sServicePort: 6443
    kubeProxyReplacement: true
    operator:
      replicas: 1
    routingMode: native
