apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: monitoring
spec:
  interval: 1h
  chart:
    spec:
      chart: loki
      version: 6.*
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: monitoring
      interval: 1h
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    global:
      clusterDomain: k8s.internal
    deploymentMode: SingleBinary
    gateway:
      enabled: false
    backend:
      replicas: 0
    read:
      replicas: 0
    write:
      replicas: 0
    ingester:
      replicas: 0
    querier:
      replicas: 0
    queryFrontend:
      replicas: 0
    queryScheduler:
      replicas: 0
    distributor:
      replicas: 0

    loki:
      auth_enabled: false
      commonConfig:
        replication_factor: 1
        ring:
          kvstore:
            store: memberlist
          instance_enable_ipv6: true
      schemaConfig:
        configs:
          - from: "2025-01-01"
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              prefix: loki_index_
              period: 24h
      extraMemberlistConfig:
        bind_addr:
          - "::"
      storage:
        type: filesystem
        bucketNames:
          chunks: filesystem
          ruler: filesystem
          admin: filesystem
      structuredConfig:
        compactor:
          working_directory: /var/loki/compactor
          retention_enabled: true
          delete_request_store: filesystem
        frontend:
          address: "::"
        limits_config:
          retention_period: 720h

    singleBinary:
      replicas: 1
      persistence:
        enabled: true
        size: 50Gi
        storageClass: longhorn
