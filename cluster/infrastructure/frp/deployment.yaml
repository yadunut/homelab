apiVersion: apps/v1
kind: Deployment
metadata:
  name: frp
  namespace: frp
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: frp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frp
    spec:
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 65532
        fsGroupChangePolicy: OnRootMismatch
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: frps
          image: ghcr.io/fatedier/frps:v0.70.0@sha256:d24fc852918f7b2f0117a1d8a86a9820edd3fc7acf82068a0ae82212204b9187
          imagePullPolicy: IfNotPresent
          args:
            - -c
            - /etc/frp/frps.toml
          ports:
            - name: http-vhost
              containerPort: 8080
              protocol: TCP
            - name: ssh-gateway
              containerPort: 2200
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          startupProbe:
            tcpSocket:
              port: ssh-gateway
            periodSeconds: 2
            timeoutSeconds: 1
            failureThreshold: 30
          readinessProbe:
            tcpSocket:
              port: http-vhost
            periodSeconds: 5
            timeoutSeconds: 1
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: ssh-gateway
            periodSeconds: 10
            timeoutSeconds: 1
            failureThreshold: 3
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: config
              mountPath: /etc/frp
              readOnly: true
            - name: secrets
              mountPath: /run/secrets/frp
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: frp
            items:
              - key: frps.toml
                path: frps.toml
              - key: authorized_keys
                path: authorized_keys
        - name: secrets
          secret:
            secretName: frp
            defaultMode: 0440
            items:
              - key: auth-token
                path: auth-token
              - key: ssh-host-key
                path: ssh-host-key
